services:
  # PHP-FPM Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecourse-app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - /var/www/html/public/build
    networks:
      - ecourse-network
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-ecourse}
      - DB_USERNAME=${DB_USERNAME:-ecourse_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: ecourse-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ecourse-network
    depends_on:
      - app

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: ecourse-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ecourse}
      MYSQL_USER: ${DB_USERNAME:-ecourse_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ecourse-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Vite Dev Server (Hot Reload)
  vite:
    image: node:18-alpine
    container_name: ecourse-vite
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - ecourse-network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ecourse-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    networks:
      - ecourse-network
    depends_on:
      mysql:
        condition: service_healthy

  # Redis Cache
  redis:
    image: redis:alpine
    container_name: ecourse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - ecourse-network

networks:
  ecourse-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
